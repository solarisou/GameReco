# --- Serveur ---
server.port=8080

# --- Base de données MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/ter_reco?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# --- JWT ---
jwt.secret=ter_reco_secret_key_change_in_production
jwt.expiration=86400000

# --- Moteur Python ---
python.engine.url=http://localhost:5000